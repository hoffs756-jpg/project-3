<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>project 3</title>
  <link rel="icon" type="image/x-icon" href="apple-icon-152x152.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>
<div id="grain"></div>

<canvas id="particles"></canvas>

<div id="atmosphere">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>


<!-- Intro -->
<div id="intro">
  <div class="intro-city">New York<br><em>City</em></div>
  <p class="intro-sub">An atmospheric weather experience</p>
  <button class="listen-btn" onclick="enterExperience()">Feel the weather</button>
</div>

<!-- Main view -->
<div id="weather-view">
  <div id="sense-panel">
    <div class="condition-word" id="conditionWord">
      <span id="conditionText">—</span>
    </div>
    <p class="sense-desc" id="senseDesc"></p>
    <div class="wave-viz" id="waveViz">
      <div class="wave-bar" style="animation-delay:0s"></div>
      <div class="wave-bar" style="animation-delay:0.15s"></div>
      <div class="wave-bar" style="animation-delay:0.3s"></div>
      <div class="wave-bar" style="animation-delay:0.45s"></div>
      <div class="wave-bar" style="animation-delay:0.6s"></div>
      <div class="wave-bar" style="animation-delay:0.75s"></div>
      <div class="wave-bar" style="animation-delay:0.9s"></div>
    </div>
  </div>

  <div id="dev-switcher">
  <span class="dev-label">Preview themes</span>
  <div class="dev-buttons">
    <button class="dev-btn active" data-theme="cloudy"  onclick="previewTheme('cloudy')">☁ Cloudy</button>
    <button class="dev-btn"        data-theme="rainy"   onclick="previewTheme('rainy')">🌧 Rain</button>
    <button class="dev-btn"        data-theme="sunny"   onclick="previewTheme('sunny')">☀ Sunny</button>
    <button class="dev-btn"        data-theme="clear"   onclick="previewTheme('clear')">🌤 Clear</button>
    <button class="dev-btn"        data-theme="snowy"   onclick="previewTheme('snowy')">❄ Snow</button>
    <button class="dev-btn"        data-theme="stormy"  onclick="previewTheme('stormy')">⚡ Storm</button>
  </div>
  <span class="dev-hint">or press 1–6</span>
</div>

  <div id="data-panel">
    <div class="data-label">Right now</div>
    <div class="data-temp" id="tempDisplay">—<sup>°</sup></div>

    <div class="data-meta" id="dataMeta">
      <div class="meta-item">
        <span class="meta-val" id="condText">—</span>
        <span class="meta-key">Conditions</span>
      </div>
      <div class="meta-item">
        <span class="meta-val" id="highToday">—°</span>
        <span class="meta-key">Today's High</span>
      </div>
      <div class="meta-item">
        <span class="meta-val" id="rainChance">—%</span>
        <span class="meta-key">Rain Chance</span>
      </div>
      <div class="meta-item">
        <span class="meta-val" id="dayNight">—</span>
        <span class="meta-key">Time of Day</span>
      </div>
    </div>

    <div class="divider" id="divider"></div>
    <div class="forecast-row" id="forecastRow"></div>
  </div>

  <div id="bottom-bar">
    <span class="bottom-loc">40.7128° N, 74.0060° W</span>
    <span class="bottom-time" id="liveTime"></span>
    <div class="sound-toggle" id="soundToggle" onclick="toggleSound()">
      <div class="sound-dot" id="soundDot"></div>
      <span id="soundLabel">Atmosphere on</span>
    </div>
  </div>
</div>

<script src="main.js"></script>
</body>
</html>
